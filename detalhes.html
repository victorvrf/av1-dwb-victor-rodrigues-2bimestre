<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Jogo - Central Gamer</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Background Dinâmico (Cinematográfico) -->
    <div id="detailsBackground" class="details-bg"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-play-fill text-primary"></i> Central Gamer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-arrow-left"></i> Voltar ao Catálogo</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="w-100 flex-grow-1">
        <!-- Error Alert -->
        <div class="container mt-4">
            <div id="errorAlert" class="alert alert-danger d-none shadow" role="alert"></div>
        </div>

        <!-- Detalhes container -->
        <div id="gameDetailsContainer" class="pb-5">
            <!-- Skeleton Inicial para Detalhes -->
            <div class="container my-5 text-center">
                <div class="skeleton" style="height: 50vh; border-radius: 20px; width: 100%;"></div>
                <div class="row mt-4">
                    <div class="col-lg-8"><div class="skeleton" style="height: 300px; width: 100%; border-radius: 16px;"></div></div>
                    <div class="col-lg-4"><div class="skeleton" style="height: 300px; width: 100%; border-radius: 16px;"></div></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Lightbox Container -->
    <div id="lightbox" class="lightbox d-none">
        <button class="lightbox-close" onclick="closeLightbox()" aria-label="Fechar galeria">&times;</button>
        <button class="lightbox-prev" onclick="changeLightbox(-1)" aria-label="Foto anterior">&#10094;</button>
        <img id="lightboxImg" class="lightbox-content" src="" alt="Zoomed Screenshot">
        <button class="lightbox-next" onclick="changeLightbox(1)" aria-label="Próxima foto">&#10095;</button>
    </div>

    <!-- Footer -->
    <footer class="text-light text-center py-4 mt-5 border-top border-secondary" style="background-color: var(--darker-bg);">
        <div class="container">
            <p class="mb-0 fw-bold">&copy; 2026 Central Gamer - RAWG API.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/mockData.js"></script>
    <script src="js/api.js"></script>
    <script src="js/detalhes.js"></script>
</body>
</html>
